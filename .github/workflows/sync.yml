name: Sync Fork

on:
  push:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: # on button click

jobs:
  repo-sync:

    runs-on: ubuntu-latest

    steps:
      - uses: tgymnich/fork-sync@v1.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          head: main

      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 5
          keep_minimum_runs: 5
